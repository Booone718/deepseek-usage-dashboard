services:
  deepseek-usage:
    build:
      context: .
      args:
        PYTHON_IMAGE: python:3.12-slim
        PIP_INDEX_URL: https://pypi.org/simple
    container_name: deepseek-usage
    ports:
      - "18080:8080"
    volumes:
      - ./data:/app/data
      - ./secrets:/app/secrets:ro
    environment:
      DATA_DIR: /app/data
      UPLOAD_RETENTION_DAYS: "365"
      CLEANUP_ENABLED: "true"
      AUTO_IMPORT_ENABLED: "false"
      DEEPSEEK_EXPORT_CURL_FILE: /app/secrets/deepseek-export.curl
      DEEPSEEK_SINGLE_ACCOUNT_USER_ID: ""
      AUTO_IMPORT_DAILY_TIME: "20:30"
      AUTO_IMPORT_TIMEZONE: Asia/Shanghai
      # Set a password to enable HTTP Basic Auth.
      # APP_PASSWORD: "change-me"
    restart: unless-stopped
